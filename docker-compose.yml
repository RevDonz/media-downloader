# Deploy 1-perintah untuk VPS:  docker compose up -d --build
services:
  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    # (opsional) simpan file unduhan sementara di volume agar tidak menuh-i layer
    tmpfs:
      - /tmp

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
